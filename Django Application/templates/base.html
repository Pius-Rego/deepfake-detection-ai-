<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/jquery-ui.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <title>{% block title %}DRISHTI{% endblock %}</title>
    <style>
        :root {
            --bg-900: #06131a;
            --bg-850: #0c1d24;
            --bg-800: #10272f;
            --panel: rgba(10, 24, 31, 0.86);
            --panel-strong: rgba(13, 31, 40, 0.96);
            --line: rgba(130, 171, 161, 0.18);
            --text: #edf7f2;
            --muted: #a6c2b7;
            --accent: #d8b15a;
            --accent-soft: rgba(216, 177, 90, 0.14);
            --green: #61d39f;
            --red: #ff7d7d;
            --blue: #72c7ff;
            --radius-lg: 28px;
            --radius-md: 18px;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: "IBM Plex Sans", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(216, 177, 90, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(114, 199, 255, 0.14), transparent 24%),
                linear-gradient(145deg, #031017 0%, #071921 42%, #0d2027 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 44px 44px;
            opacity: 0.25;
            pointer-events: none;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(3, 12, 17, 0.1), rgba(3, 12, 17, 0.65));
            pointer-events: none;
            z-index: -1;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: -0.03em;
        }

        a {
            color: inherit;
        }

        main {
            min-height: calc(100vh - 180px);
        }

        .app-shell {
            width: min(1220px, calc(100% - 32px));
            margin: 0 auto;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .panel-soft {
            background: rgba(11, 29, 37, 0.66);
            border: 1px solid rgba(166, 194, 183, 0.1);
            border-radius: var(--radius-md);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid rgba(216, 177, 90, 0.2);
            color: #f6deb0;
            font-size: 0.86rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .metric-card {
            padding: 22px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: linear-gradient(180deg, rgba(15, 33, 43, 0.94), rgba(8, 19, 25, 0.96));
        }

        .metric-value {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(1.8rem, 3vw, 2.7rem);
            font-weight: 700;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.86rem;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .status-pill.high,
        .status-pill.critical {
            background: rgba(255, 125, 125, 0.14);
            border-color: rgba(255, 125, 125, 0.24);
            color: #ffc5c5;
        }

        .status-pill.elevated {
            background: rgba(216, 177, 90, 0.12);
            border-color: rgba(216, 177, 90, 0.22);
            color: #f4deb0;
        }

        .status-pill.low {
            background: rgba(97, 211, 159, 0.14);
            border-color: rgba(97, 211, 159, 0.26);
            color: #c8f6e0;
        }

        .tone-critical {
            color: var(--red);
        }

        .tone-high {
            color: #ffb07d;
        }

        .tone-elevated {
            color: var(--accent);
        }

        .tone-low {
            color: var(--green);
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-title h2,
        .section-title h3 {
            margin: 0;
        }

        .muted {
            color: var(--muted);
        }

        .message-stack {
            width: min(1220px, calc(100% - 32px));
            margin: 20px auto 0;
        }

        .message-stack .alert {
            border: none;
            border-radius: 16px;
        }

        .btn-drishti {
            background: linear-gradient(135deg, #e4be6b 0%, #b9892f 100%);
            color: #071015;
            border: none;
            font-weight: 700;
            border-radius: 16px;
            padding: 14px 20px;
        }

        .btn-drishti:hover {
            color: #071015;
            filter: brightness(1.05);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 600;
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(216, 177, 90, 0.3);
            background: rgba(216, 177, 90, 0.08);
        }

        @media (max-width: 767px) {
            .app-shell,
            .message-stack {
                width: min(100% - 20px, 1220px);
            }
        }
    </style>
</head>
<body>
    {% include 'nav-bar.html' %}

    {% if messages %}
    <div class="message-stack">
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-danger{% elif message.tags == 'warning' %}alert-warning{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <script src="/static/js/jquery-3.4.1.min.js"></script>
    <script src="/static/js/popper.min.js"></script>
    <script src="/static/js/jquery-ui.min.js"></script>
    {% block js_cripts %}{% endblock %}
</body>
</html>
